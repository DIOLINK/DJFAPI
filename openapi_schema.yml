components:
  schemas:
    CarrouselItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        imagen:
          type: string
          format: uri
        texto:
          type: string
          maxLength: 255
        orden:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        activo:
          type: boolean
        creado:
          type: string
          format: date-time
          readOnly: true
      required:
      - creado
      - id
      - imagen
      - texto
    EstadoEnum:
      enum:
      - pendiente
      - confirmada
      - cancelada
      type: string
      description: |-
        * `pendiente` - Pendiente
        * `confirmada` - Confirmada
        * `cancelada` - Cancelada
    LegalText:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        titulo:
          type: string
          maxLength: 100
        contenido:
          type: string
        visible:
          type: boolean
        creado:
          type: string
          format: date-time
          readOnly: true
      required:
      - contenido
      - creado
      - id
      - titulo
    Paciente:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          title: Nombre de usuario
          description: Obligatorio. Longitud máxima de 150 caracteres. Solo puede
            estar formado por letras, números y los caracteres @/./+/-/_.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Dirección de email
          maxLength: 254
        first_name:
          type: string
          title: Nombre
          maxLength: 150
        last_name:
          type: string
          title: Apellido
          maxLength: 150
      required:
      - id
      - username
    PatchedCarrouselItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        imagen:
          type: string
          format: uri
        texto:
          type: string
          maxLength: 255
        orden:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        activo:
          type: boolean
        creado:
          type: string
          format: date-time
          readOnly: true
    PatchedLegalText:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        titulo:
          type: string
          maxLength: 100
        contenido:
          type: string
        visible:
          type: boolean
        creado:
          type: string
          format: date-time
          readOnly: true
    PatchedReserva:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        paciente:
          allOf:
          - $ref: '#/components/schemas/Paciente'
          readOnly: true
        paciente_id:
          type: integer
          writeOnly: true
        fecha_hora:
          type: string
          format: date-time
        estado:
          allOf:
          - $ref: '#/components/schemas/EstadoEnum'
          readOnly: true
        nota:
          type: string
        creado:
          type: string
          format: date-time
          readOnly: true
        actualizado:
          type: string
          format: date-time
          readOnly: true
    Reserva:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        paciente:
          allOf:
          - $ref: '#/components/schemas/Paciente'
          readOnly: true
        paciente_id:
          type: integer
          writeOnly: true
        fecha_hora:
          type: string
          format: date-time
        estado:
          allOf:
          - $ref: '#/components/schemas/EstadoEnum'
          readOnly: true
        nota:
          type: string
        creado:
          type: string
          format: date-time
          readOnly: true
        actualizado:
          type: string
          format: date-time
          readOnly: true
      required:
      - actualizado
      - creado
      - estado
      - fecha_hora
      - id
      - paciente
      - paciente_id
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
